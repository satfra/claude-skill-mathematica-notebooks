name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .skill bundle
        run: |
          # Stage the skill (without evals) so the .skill bundle keeps the
          # standalone Anthropic Skill layout: SKILL.md at the top of the
          # zipped `mathematica-notebook/` directory.
          SRC=mathematica-notebook/skills/mathematica-notebook
          chmod +x "$SRC/scripts/run_wolfram.sh"
          mkdir -p _bundle/mathematica-notebook
          cp "$SRC/SKILL.md" _bundle/mathematica-notebook/
          cp -r "$SRC/scripts" _bundle/mathematica-notebook/
          cd _bundle
          zip -r "../mathematica-notebook-${GITHUB_REF_NAME}.skill" mathematica-notebook

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: mathematica-notebook-*.skill
          generate_release_notes: true
          fail_on_unmatched_files: true
